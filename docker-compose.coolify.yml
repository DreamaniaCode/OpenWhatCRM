# OpenWA - Optimized Docker Compose for Coolify Deployment
# This configuration implements the single-domain reverse proxy setup (Dashboard + API)

services:
  # ===== CORE: OpenWA Backend API =====
  openwa-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openwa-api
    restart: unless-stopped
    expose:
      - '2785'
    environment:
      # Core Settings
      - NODE_ENV=production
      - PORT=2785
      - LOG_LEVEL=info
      
      # Database: Persistent SQLite (Recommended for simplified Coolify deployment)
      - DATABASE_TYPE=sqlite
      - DATABASE_NAME=/app/data/openwa.sqlite
      
      # Engine Configuration (whatsapp-web.js with Puppeteer inside Docker)
      - ENGINE_TYPE=whatsapp-web.js
      - SESSION_DATA_PATH=/app/data/sessions
      - PUPPETEER_HEADLESS=true
      - PUPPETEER_ARGS=--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu
      
      # Storage
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/data/media
      
      # Redis Queue (Disabled by default, can be orchestrated programmatically)
      - REDIS_ENABLED=false
      
      # Plugins System
      - PLUGINS_ENABLED=true
      - PLUGINS_DIR=/app/data/plugins
      
      # Security (Optional: Set a master key for API authentication)
      # - API_MASTER_KEY=your-secure-master-key
      
      # Swagger API Documentation
      - ENABLE_SWAGGER=true
      
    volumes:
      - openwa-data:/app/data
      # Mount Docker socket to allow NestJS container orchestration features
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:2785/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===== CORE: Dashboard & Nginx Reverse Proxy =====
  openwa-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: openwa-dashboard
    restart: unless-stopped
    ports:
      # Coolify will bind your public domain (SSL-secured) to this service
      - "80:80"
    depends_on:
      - openwa-api

volumes:
  openwa-data:
    driver: local

networks:
  default:
    name: openwa-network
