# OpenWA - Basic NGINX Reverse Proxy Deployment
# This configuration runs the OpenWA API and a Dashboard that serves as an NGINX reverse proxy.
# The NGINX server in the dashboard container proxies /api and /socket.io requests to the API.

services:
  openwa-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openwa-api
    restart: unless-stopped
    expose:
      - '2785'
    environment:
      # Core Settings
      - NODE_ENV=production
      - PORT=2785
      - LOG_LEVEL=info
      
      # Database
      - DATABASE_TYPE=sqlite
      - DATABASE_NAME=/app/data/openwa.sqlite
      
      # Engine Configuration 
      - ENGINE_TYPE=whatsapp-web.js
      - SESSION_DATA_PATH=/app/data/sessions
      - PUPPETEER_HEADLESS=true
      - PUPPETEER_ARGS=--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu
      
      # Storage
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/data/media
      
      # Redis Queue (Disabled for basic deployment)
      - REDIS_ENABLED=false
      
      # Plugins System
      - PLUGINS_ENABLED=true
      - PLUGINS_DIR=/app/data/plugins
      
      # Security (Optional: Set a master key for API authentication)
      - API_MASTER_KEY=openwa_master_secret
      
      
      # Swagger API Documentation
      - ENABLE_SWAGGER=true
      
    volumes:
      - openwa-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:2785/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - openwa-network

  openwa-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: openwa-dashboard
    restart: unless-stopped
    ports:
      - "8282:80"
    depends_on:
      - openwa-api
    networks:
      - openwa-network

volumes:
  openwa-data:
    driver: local

networks:
  openwa-network:
    driver: bridge
